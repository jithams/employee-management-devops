---
- name: Install Apache Package
  ansible.builtin.dnf:
    name: httpd
    state: present

- name: Start and Enable Apache Service
  ansible.builtin.service:
    name: httpd
    state: started
    enabled: yes

- name: Copy Employee Portal Web Page
  ansible.builtin.copy:
    src: index.html
    dest: /var/www/html/index.html
    owner: root
    group: root
    mode: '0644'
