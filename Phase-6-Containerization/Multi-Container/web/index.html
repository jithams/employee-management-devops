<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Employee Management Portal</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    font-family:Arial, Helvetica, sans-serif;
    background:#eef2f7;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;

}

.container{

    width:750px;
    background:#ffffff;
    padding:50px;
    border-radius:12px;
    box-shadow:0 8px 25px rgba(0,0,0,.15);
    text-align:center;

}

h1{

    color:#2c3e50;
    margin-bottom:15px;

}

h2{

    color:#16a085;
    font-weight:normal;
    margin-bottom:30px;

}

p{

    color:#555;
    font-size:18px;
    line-height:1.7;

}

.status{

    margin-top:35px;
    display:inline-block;
    padding:12px 25px;
    background:#28a745;
    color:white;
    border-radius:5px;
    font-weight:bold;

}

.footer{

    margin-top:40px;
    color:#888;
    font-size:14px;

}

</style>

</head>

<body>

<div class="container">

<h1>Employee Management Portal</h1>

<h2>Multi-Container Deployment</h2>

<p>

The application is successfully deployed using
Docker Compose with multiple containers.

</p>

<div class="status">

Application Status : Running

</div>

<div class="footer">

Powered by Docker & Docker Compose

</div>

</div>

</body>

</html>
