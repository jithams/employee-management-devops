<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Management Portal</title>

    <style>

        body{
            margin:0;
            padding:0;
            font-family:Arial, Helvetica, sans-serif;
            background:#f4f6f9;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .container{
            background:#ffffff;
            padding:50px;
            width:700px;
            border-radius:12px;
            box-shadow:0 5px 20px rgba(0,0,0,0.15);
            text-align:center;
        }

        h1{
            color:#2c3e50;
            margin-bottom:20px;
        }

        h2{
            color:#16a085;
            font-weight:normal;
            margin-bottom:30px;
        }

        p{
            color:#555;
            font-size:18px;
            line-height:1.6;
        }

        .status{
            margin-top:30px;
            display:inline-block;
            background:#16a085;
            color:white;
            padding:12px 24px;
            border-radius:6px;
            font-weight:bold;
        }

    </style>

</head>

<body>

<div class="container">

    <h1>Employee Management Portal</h1>

    <h2>Docker Container Deployment</h2>

    <p>
        The application has been successfully deployed
        and is running inside a Docker container.
    </p>

    <div class="status">
        Application Status : Running
    </div>

</div>

</body>
</html>
